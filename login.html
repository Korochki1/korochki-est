<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📚 Корочки.есть</h1>
                <p>Вход в систему онлайн-курсов ДПО</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Логин или Email</label>
                    <input type="text" id="login" placeholder="Введите логин или email" required>
                </div>
                
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>
            
            <div class="auth-footer">
                Еще не зарегистрированы? <a href="register.html">Регистрация</a>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
<head>
    <meta name="robots" content="noindex, nofollow">
    <title>Вход - Корочки.есть</title>
</head>
