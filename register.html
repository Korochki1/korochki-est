<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📚 Корочки.есть</h1>
                <p>Регистрация нового пользователя</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Логин (латиница и цифры, мин. 6 символов)</label>
                    <input type="text" id="login" placeholder="например: john123" required>
                    <small class="error-message" id="loginError"></small>
                </div>
                
                <div class="form-group">
                    <label>Пароль (мин. 8 символов)</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <small class="error-message" id="passwordError"></small>
                </div>
                
                <div class="form-group">
                    <label>ФИО (только кириллица)</label>
                    <input type="text" id="fullName" placeholder="Иванов Иван Иванович" required>
                    <small class="error-message" id="fullNameError"></small>
                </div>
                
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="phone" placeholder="8(XXX)XXX-XX-XX" required>
                    <small class="error-message" id="phoneError"></small>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="ivan@example.com" required>
                    <small class="error-message" id="emailError"></small>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Создать пользователя</button>
            </form>
            
            <div class="auth-footer">
                Уже зарегистрированы? <a href="login.html">Войти в систему</a>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
<head>
    <meta name="robots" content="noindex, nofollow">
    <title>Регистрация - Корочки.есть</title>
</head>
